name: test
on: [push, pull_request]
jobs:
  build:
    name: ${{ matrix.os }} Crystal latest
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu", "macos"]
    steps:
      - uses: actions/checkout@v7
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - name: Install Ubuntu packages (ubuntu)
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          . /etc/os-release
          repo="xUbuntu_${VERSION_ID}"
          keyring=/usr/share/keyrings/science_gr-framework.gpg
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gpg
          curl -fsSL "https://download.opensuse.org/repositories/science:/gr-framework/${repo}/Release.key" | gpg --dearmor | sudo tee "${keyring}" > /dev/null
          echo "deb [signed-by=${keyring}] https://download.opensuse.org/repositories/science:/gr-framework/${repo}/ /" | sudo tee /etc/apt/sources.list.d/science_gr-framework.list
          sudo apt-get update
          sudo apt-get install -y gr
      - name: Set up Homebrew (macos)
        if: ${{ matrix.os == 'macos' }}
        run: |
          brew update
          brew install libgr
      - run: shards install
      - name: Run tests (ubuntu)
        if: ${{ matrix.os == 'ubuntu' }}
        env:
          QT_QPA_PLATFORM: offscreen
          GRDIR: /usr/gr
        run: crystal spec
      - name: Run tests (macos)
        if: ${{ matrix.os == 'macos' }}
        env:
          QT_QPA_PLATFORM: offscreen
        run: crystal spec
